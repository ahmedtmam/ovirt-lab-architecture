# ============================================================
# ansible/inventory/hosts.ini
# oVirt Lab Ansible Inventory
# ============================================================

# ── DNS Server ───────────────────────────────────────────────
[dns]
dns.lab.local ansible_host=192.168.5.140

# ── NFS Server ───────────────────────────────────────────────
[nfs]
nfs.lab.local ansible_host=192.168.5.141

# ── oVirt Compute Hosts (all 3) ──────────────────────────────
[ovirt_hosts]
ovirt1.lab.local ansible_host=192.168.5.142
ovirt2.lab.local ansible_host=192.168.5.143
ovirt3.lab.local ansible_host=192.168.5.144

# ── oVirt Engine VM ──────────────────────────────────────────
# Note: engine is deployed by hosted-engine --deploy, not Ansible
# Add here only AFTER the hosted engine is up for post-config tasks
[ovirt_engine]
engine.lab.local ansible_host=192.168.5.145

# ── All Lab Nodes ────────────────────────────────────────────
[lab:children]
dns
nfs
ovirt_hosts

# ── Global Variables ─────────────────────────────────────────
[all:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

# DNS resolver to use on all managed hosts
lab_dns_server=192.168.5.140
lab_domain=lab.local
lab_network=192.168.5.0/24

# NFS server details
nfs_server=nfs.lab.local
nfs_data_export=/exports/ovirt-data
nfs_iso_export=/exports/ovirt-iso
nfs_engine_export=/exports/ovirt-hosted-engine

# oVirt version
ovirt_repo_url=https://resources.ovirt.org/pub/yum-repo/ovirt-release45.rpm
