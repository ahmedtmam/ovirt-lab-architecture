---
# ansible/roles/ovirt-host/tasks/main.yml
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install oVirt 4.5 repo
  ansible.builtin.dnf:
    name: "https://resources.ovirt.org/pub/yum-repo/ovirt-release45.rpm"
    state: present
    disable_gpg_check: true

- name: Enable DNF modules
  ansible.builtin.command: "dnf module enable -y {{ item }}"
  loop: [javapackages-tools, pki-deps]
  changed_when: true

- name: Install ovirt-host
  ansible.builtin.dnf:
    name: [ovirt-host, cockpit-ovirt-dashboard]
    state: present

- name: Ensure firewalld active
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
