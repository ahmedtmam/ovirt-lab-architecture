// ============================================================
// /etc/named.conf — DNS Server: dns.lab.local (192.168.5.140)
// oVirt Lab — lab.local domain
// ============================================================

options {
    listen-on port 53 { 127.0.0.1; 192.168.5.140; };
    listen-on-v6 port 53 { none; };
    directory       "/var/named";
    dump-file       "/var/named/data/cache_dump.db";
    statistics-file "/var/named/data/named_stats.txt";
    memstatistics-file "/var/named/data/named_mem_stats.txt";

    recursion yes;
    allow-recursion { 192.168.5.0/24; 127.0.0.1; };
    allow-query     { 192.168.5.0/24; 127.0.0.1; };

    forwarders {
        8.8.8.8;
        8.8.4.4;
    };

    dnssec-validation no;

    managed-keys-directory "/var/named/dynamic";
    pid-file "/run/named/named.pid";
    session-keyfile "/run/named/session.key";
};

logging {
    channel default_debug {
        file "data/named.run";
        severity dynamic;
    };
};

// Forward zone — lab.local
zone "lab.local" IN {
    type master;
    file "/var/named/lab.local.zone";
    allow-update { none; };
    allow-transfer { none; };
};

// Reverse zone — 192.168.5.0/24
zone "5.168.192.in-addr.arpa" IN {
    type master;
    file "/var/named/5.168.192.arpa";
    allow-update { none; };
    allow-transfer { none; };
};
